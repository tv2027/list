# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  workflow_dispatch:
        
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests tqdm aiohttp
    - name: Test with pytest
      run: |
        cd mac-to-m3u
        python hello.py
        
        # python maclist.py    http://zeroonemac1.xyz:8080/play/live.php?mac=00:1A:79:C4:01:80
        # python maclist.py    http://m.redtvpakket.nl:80  00:1A:79:D4:92:74
        echo " test file " >> test.txt
        ls
        
    - name: Upload to Dropbox
      uses: Lewuathe/dropbox-github-action@v1.0.3
      with:
        dropbox-app-key: ${{ secrets.DROPBOX_APP_KEY }}
        dropbox-app-secret: ${{ secrets.DROPBOX_APP_SECRET }}
        dropbox-refresh-token: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        source-path: './test.txt'
        target-path: '/TVs/test.txt'
        write-mode:  'add'
        #. See more detail here. https://www.dropbox.com/developers/documentation/http/documentation#files-upload
          
