# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  workflow_dispatch:
        
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests tqdm aiohttp
    - name: Test with pytest
      run: |
        cd mac-to-m3u
        python hello.py
        
        # python maclist.py    http://zeroonemac1.xyz:8080/play/live.php?mac=00:1A:79:C4:01:80
        # python maclist.py    http://m.redtvpakket.nl:80  00:1A:79:D4:92:74
        echo " test file " >> test.txt
        
    - name: Upload file to Dropbox
      uses: thedefaultman/dropbox-large-file-uploader@v2.3.5
      with:
        app_key: ${{ secrets.DROPBOX_APP_KEY }}
        app_secret: ${{ secrets.DROPBOX_APP_SECRET }}
        refresh_token: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        file_path: './test.txt'
        dropbox_path: '/TVs/test.txt'
          
